name: Run Federer Ticket Tracker

on:
  schedule:
    # This is the "Cron schedule". 0 */6 * * * means: Run at minute 0, every 6 hours.
    - cron: '0 */6 * * *'
  workflow_dispatch: # This adds a button so you can also force run it manually whenever you want!

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-node-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        python -m playwright install chromium

    - name: Run Scraper Script
      run: python tracker.py
